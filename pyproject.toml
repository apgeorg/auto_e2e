[tool.mypy]
# Introduce static typing incrementally. The existing model code is untyped, so
# globally mypy is lenient (don't fail on missing annotations or third-party
# stubs). New safety-critical modules are type-checked strictly via the override
# below — the MISRA-spirit "highest-integrity code first" approach. Expand the
# strict set as more modules get annotated.
python_version = "3.12"
mypy_path = "Model"
explicit_package_bases = true
ignore_missing_imports = true
follow_imports = "silent"

[[tool.mypy.overrides]]
module = "model_components.safety.*"
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true
