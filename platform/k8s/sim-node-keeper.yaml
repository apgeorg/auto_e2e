# Keeps the simulation GPU node warm. Same pattern as gpu-node-keeper.
# Pod requests no GPU — the GPU stays free for CARLA server.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-node-keeper
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sim-node-keeper
  template:
    metadata:
      labels:
        app: sim-node-keeper
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      tolerations:
        - key: nvidia.com/gpu-sim
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        workload-type: simulation
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
