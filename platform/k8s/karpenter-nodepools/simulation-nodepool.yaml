# Simulation NodePool: g5.xlarge (A10G 24GB) for CARLA headless.
# ODCR pinned to AZ, on-demand only. Dedicated taint separates from training.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: simulation
spec:
  template:
    metadata:
      labels:
        workload-type: simulation
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["g5.xlarge"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["us-west-2b"]
      taints:
        - key: nvidia.com/gpu-sim
          effect: NoSchedule
  limits:
    nvidia.com/gpu: "1"
